
# The sensor joins the network using OTAA
# The sensor only transmits the current co2 level

manufacturer: Adeunis
model: Field Test Device
support_url: https://www.adeunis.com/en/field-test-device-iot/

aliases:
  - !DevEUI ^0018B2([0-9A-F]){10}$

data_fields:
  - name: battery_level
    friendly_name: Battery Level
    state_class: measurement
    device_class: battery
    unit_of_measurement: "%"

  - name: dl_counter
    friendly_name: Nr of downlinks received
    state_class: measurement

  - name: ul_counter
    friendly_name: Nr of uplinks sent
    state_class: measurement

  - name: rssi_dl
    friendly_name: Downlink level (RSSI)
    state_class: measurement
    device_class: signal_strength
    unit_of_measurement: dBm

  - name: snr_dl
    friendly_name: Downlink level (SNR)
    state_class: measurement
    device_class: signal_strength
    unit_of_measurement: dB
  
  - name: temperature
    friendly_name: Temperature
    state_class: measurement
    device_class: temperature
    unit_of_measurement: °C

  - name: sats
    friendly_name: Number of satellites

options:
  has_gps: True

# Example value on MQTT: 
