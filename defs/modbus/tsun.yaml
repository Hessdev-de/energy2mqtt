manufacturer: TSUN
model: Micro Battery
registers:

#######################################################################################
#
# Read-Only Input registers
# 

#######################################################################################
# Operational Mode
#
  - name: sys_operating_mode
    input_type: Input
    register: 3000
    length: 1
    format: UInt16
    scaler: 1.0
    platform: sensor
    description: "System operation mode"
    value_template: "{% if ## == 0 %}Shutdown{% elif ## == 1 %}BMS offline (disconnected){% elif ## == 2 %}Off-grid{% elif ## == 3 %}Grid connected{% elif ## == 4 %}Fault{% else %}Unknown{% endif %}"

#######################################################################################
# Global Battery information, voltqage, current, power and state-of-charge
#
  - name: battery_voltage
    input_type: Input
    register: 3016
    length: 1
    format: UInt16
    scaler: 0.1
    description: "Battery"
    device_class: voltage
    unit_of_measurement: "V"

  - name: battery_current
    input_type: Input
    register: 3017
    length: 1
    format: Int16
    scaler: -0.1
    description: "Battery"
    device_class: current
    unit_of_measurement: "A"

  - name: battery_power
    input_type: Input
    register: 3018
    length: 1
    format: Int16
    scaler: -1.0
    description: "Battery"
    device_class: power
    unit_of_measurement: "W"

  - name: soc
    input_type: Input
    register: 3019
    length: 1
    format: UInt16
    scaler: 1.0
    description: "State of Charge"
    unit_of_measurement: "%"
    state_class: measurement

#######################################################################################
# Grid information of the battery
#
  - name: grid_power
    input_type: Input
    register: 3034
    length: 1
    format: Int16
    scaler: -1.0
    description: "Grid"
    device_class: power
    unit_of_measurement: "W"

  - name: grid_reactive
    input_type: Input
    register: 3036
    length: 1
    format: UInt16
    scaler: 1.0
    description: "Grid"
    device_class: reactive_power
    unit_of_measurement: "var"

#######################################################################################
# Internal temperature of the battery
#
  - name: temperature
    input_type: Input
    register: 3082
    length: 1
    format: UInt16
    scaler: 0.1
    description: "Internal temperature"
    device_class: temperature
    unit_of_measurement: "°C"

#######################################################################################
# Information about the first battery pack
#
# If I get a battery with more than one pack I will add more registers
#
  - name: pack_one_voltage
    input_type: Input
    register: 4012
    length: 1
    format: UInt16
    scaler: 0.1
    description: Voltage of pack 1

  - name: pack_one_capacity
    input_type: Input
    register: 4024
    length: 1
    format: UInt16
    scaler: 0.1
    description: Capacity of pack 1
  
  - name: model
    input_type: Input
    register: 4600
    length: 10
    format: String
    description: Maschine Model

  - name: bms_software_version
    input_type: Input
    register: 4610
    length: 10
    format: String
    description: BMS Software Version

  - name: control_software_version_1
    input_type: Input
    register: 4620
    length: 10
    format: String
    description: Control Software Version 1

  - name: control_software_version_2
    input_type: Input
    register: 4630
    length: 10
    format: String
    description: Control Software Version 2

  - name: serialnumber
    input_type: Input
    register: 4640
    length: 10
    format: String
    description: Maschine Serial Number

#######################################################################################
# State of Health for the whole system
  - name: soh
    input_type: Input
    register: 4663
    length: 1
    format: UInt16
    scaler: 1.0
    description: "State of health"

  - name: soc_limit_min
    input_type: Holding
    register: 5038
    length: 1
    format: UInt16
    scaler: 1.0
    description: Set the desired SOC minimum limit

  - name: soc_limit_max
    input_type: Holding
    register: 5039
    length: 1
    format: UInt16
    scaler: 1.0
    description: Set the desired SOC maximum limit

#######################################################################################
#
# Holding registers
# 
  - name: operation_mode
    input_type: Holding
    register: 5040
    length: 1
    format: UInt16
    platform: sensor
    description: "Operational Mode"
    value_template: "{% if ## == 0 %}Standby{% elif ## == 1 %}Plan mode{% elif ## == 2 %}Battery{% elif ## == 3 %}Remote Control{% elif ## == 4 %}Reserved{% elif ## == 5 %}Scheduling Mode (Grid){% elif ## == 6 %}Realtime Tariff{% else %}Unknown{% endif %}"

  - name: dispatch_mode
    input_type: Holding
    register: 5041
    length: 1
    format: UInt16
    platform: sensor
    description: "Dispatching Mode"
    value_template: "{% if ## == 0 %}Numeric{% elif ## == 1 %}Percentage{% else %}Unknown{% endif %}"

  - name: dispatch_power
    input_type: Holding
    register: 5042
    length: 1
    scaler: -1.0
    format: Int16
    platform: number
    description: "Power"
    device_class: power
    unit_of_measurement: W
    min: -2000
    max: 2000

  - name: grid_norm
    input_type: Holding
    register: 5046
    length: 1
    format: UInt16
    scaler: 1.0
    description: Set the correct norm for your country

  - name: meter_type
    input_type: Holding
    register: 5047
    length: 1
    format: Int16
    platform: sensor
    description: "Meter type selected"
    value_template: "{% if ## == 0 %}None{% elif ## == 1 %}Single-phase WiFi{% elif ## == 2 %}Three-phase WiFi{% elif ## == 3 %}Single-phase RS485{% elif ## == 4 %}Three-phase RS485{% elif ## == 5 %}Single-phase Shelly{% elif ## == 6 %}Three-phase Shelly{% else %}Unknown{% endif %}"

  - name: power_gradient
    input_type: Holding
    register: 5057
    length: 1
    format: UInt16
    scaler: 1.0
    description: Ramp-up time after grid connection is detected

#######################################################################################
#
# Caution: Only use those registers if you REALLY know what you are doing!
#
  - name: bms_wakeup
    input_type: Holding
    register: 4817
    length: 1
    format: UInt16
    scaler: 1.0
    description: Wake up the BMS by sending 1

  - name: bms_connection
    input_type: Holding
    register: 4819
    length: 1
    format: UInt16
    scaler: 1.0
    description: Set the desired BMS connection state


#######################################################################################
# Templates to get the real and useable capacity for the tsun batteries
#
templates:
  - name: factory_capacity
    value: "pack_one_capacity * 51.2 / 1000"
    unit_of_measurement: kWh
    device_class: energy
    state_class: measurement

  - name: capacity
    value: "pack_one_capacity * 51.2 * (soc / 100) / 1000"
    unit_of_measurement: kWh
    device_class: energy
    state_class: measurement

  - name: max_usable_capacity
    value: "capacity * (soc_limit_max - soc_limit_min) / 100"
    unit_of_measurement: kWh
    device_class: energy
    state_class: measurement